APP_PASSWORD = "change-this-password"
DEFAULT_PROFILE_ID = "personal"

# Firestore 저장과 Google Sheets 동기화가 같은 서비스 계정을 사용합니다.
# Google Sheet로 내보내려면 이 client_email을 해당 스프레드시트에 편집자로 공유하세요.
[firebase_service_account]
type = "service_account"
project_id = "magic-pension-rebalancer-2601"
private_key_id = "YOUR_PRIVATE_KEY_ID"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY\n-----END PRIVATE KEY-----\n"
client_email = "YOUR_SERVICE_ACCOUNT@magic-pension-rebalancer-2601.iam.gserviceaccount.com"
client_id = "YOUR_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "YOUR_CLIENT_CERT_URL"
universe_domain = "googleapis.com"
